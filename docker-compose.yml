version: '3.8'

services:
  # 1. Dịch vụ Cơ sở dữ liệu (PostgreSQL)
  db:
    image: postgres:16-alpine
    container_name: taskhub_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword  # <--- Mật khẩu Postgres của bạn ở đây!
      POSTGRES_DB: taskhub_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 2. Dịch vụ Cache (Redis)
  redis:
    image: redis:7-alpine
    container_name: taskhub_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # 3. Dịch vụ Ứng dụng chính (FastAPI App)
  web:
    build: .
    container_name: taskhub_app
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - .:/code
    env_file:
      - .env.docker
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
  redis_data: